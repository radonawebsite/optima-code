<!DOCTYPE html>
<html lang="ar" dir="rtl" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <title>Optima Code | المستقبل الرقمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS 3D Effect */
        .card-3d {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            transform-style: preserve-3d;
        }
        .card-3d:hover {
            transform: translateY(-10px) rotateX(10deg) rotateY(10deg);
        }
        body { background: #050505; color: white; font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <header class="h-screen flex flex-col justify-center items-center text-center p-6 relative overflow-hidden">
        <!-- Background Animation -->
        <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-purple-900/20 via-transparent to-transparent"></div>
        
        <div class="z-10 animate-fade-in">
            <img src="logo.png" alt="Optima Code" class="w-40 h-40 mx-auto mb-8 drop-shadow-[0_0_15px_rgba(168,85,247,0.5)]">
            <h1 class="text-6xl md:text-9xl font-black mb-6 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                OPTIMA CODE
            </h1>
            <p class="text-xl md:text-2xl text-purple-400 font-light mb-10">نصنع المستقبل، بلمسة تقنية.</p>
            <a href="mailto:optimacodee@gmail.com" class="group relative px-8 py-4 bg-white text-black font-bold rounded-full overflow-hidden transition-all hover:scale-110">
                <span class="relative z-10">ابدأ رحلتك الآن</span>
                <div class="absolute inset-0 bg-purple-500 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
            </a>
        </div>
    </header>

    <!-- Services Grid -->
    <section class="container mx-auto px-6 py-20">
        <h2 class="text-4xl font-bold text-center mb-20 text-white">خدماتنا الثلاثية</h2>
        <div class="grid md:grid-cols-3 gap-10">
            
            <!-- Card 1 -->
            <div class="card-3d p-10 bg-gray-900/50 backdrop-blur-lg border border-gray-800 rounded-3xl">
                <div class="text-purple-500 text-5xl mb-6">🚀</div>
                <h3 class="text-2xl font-bold mb-4">تطوير الويب</h3>
                <p class="text-gray-400">مواقع سريعة، متجاوبة، ومصممة لتكون سابقة لزمنها.</p>
            </div>

            <!-- Card 2 -->
            <div class="card-3d p-10 bg-gray-900/50 backdrop-blur-lg border border-gray-800 rounded-3xl">
                <div class="text-purple-500 text-5xl mb-6">💎</div>
                <h3 class="text-2xl font-bold mb-4">هوية بصرية</h3>
                <p class="text-gray-400">نصمم هوية بصرية تعطي انطباع الفخامة والقوة لعلامتك.</p>
            </div>

            <!-- Card 3 -->
            <div class="card-3d p-10 bg-gray-900/50 backdrop-blur-lg border border-gray-800 rounded-3xl">
                <div class="text-purple-500 text-5xl mb-6">⚙️</div>
                <h3 class="text-2xl font-bold mb-4">أنظمة ذكية</h3>
                <p class="text-gray-400">أتمتة العمليات وتقديم حلول تقنية تعزز نمو مشروعك.</p>
            </div>

        </div>
    </section>

</body>
</html>
